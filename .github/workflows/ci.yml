# ==============================================================================
# GitHub Actions CI/CD Pipeline (Multi-Service Validation)
# ==============================================================================

name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ----------------------------------------------------------------------------
  # Backend Gate: Node, Prisma, Compile, Jest Tests
  # ----------------------------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate

      - name: Compile TypeScript
        run: |
          cd backend
          npm run build

      - name: Run Jest Unit Tests
        run: |
          cd backend
          npm run test

  # ----------------------------------------------------------------------------
  # Frontend Gate: Node, Next.js Production Compilation
  # ----------------------------------------------------------------------------
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Next.js Compile Build
        run: |
          cd frontend
          npm run build

  # ----------------------------------------------------------------------------
  # ML Service Gate: Python Syntax Checks
  # ----------------------------------------------------------------------------
  ml-service-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml-service/requirements.txt

      - name: Install Dependencies
        run: |
          cd ml-service
          pip install -r requirements.txt

      - name: Verify Python Compilation Syntax
        run: |
          cd ml-service
          python -m py_compile app/main.py app/config.py app/services/forecast.py app/services/sentiment.py app/services/optimizer.py
